<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"><!--charset: character encoding capable of encoding all characters on the web  -->
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"><!--for browser compatibility: choose rendering engine to view the page in an correct view (for old ver. IE)  -->
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>音符飞扬</title>   
        <!-- 字体 -->
        <link rel="stylesheet" href="https://font.sec.miui.com/font/css?family=MiSans:400,700">

        <style>
            /*滚动条宽度*/
        ::-webkit-scrollbar{width: 0px;
                            height: 5px;}
            /*滚动条按钮样式*/
        ::-webkit-scrollbar-thumb{border-radius: 10px;
                                  background-color: #f1f1f1;}
            /*滚动条背景样式*/
        ::-webkit-scrollbar-track{border-radius: 10px;}

        body{background-color: white;
            font-family: MiSans VF, sans-serif;
            font-style: normal;
            font-color:#3E3A39;
            width: 1920px;
            align-items: center;
            cursor:pointer;
            overflow-x: hidden;}

        h1{font-size:60;
          line-height:90;}
            
        h2{font-size:48;
          line-height:60;}

        h3{font-size:30;
          line-height:45;}
            

        .page1{margin-left:180px;
              display:flex;}

        .page1left{flex:0.8;}    
        .page1right{flex:1.2;} 
            
        .blank1{height:30px;}
        .blank2{height:180px;}
        .logo{max-width:200px;}
        .button{width: 240px;
                height: 65px;
                padding: 10px 60px;
                align-items: center;
                gap: 10px;
                border-radius: 60px;
                border: 2px solid #3E3A39;}

    
            
            a:link{color: gray;
                text-decoration:none;
                cursor: crosshair;}

            a:hover{color: black;
                text-decoration:none;
                cursor: crosshair;}

            @media only screen and (max-width: 414px){
              }

          
           
        </style> 

        <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
        <script language="javascript">
            $(document).ready(function(){
                
            $( ".about" ).hover(function() {
                    $(".about").css('color','gray');
                    $(".contact").css('color','black');
                    $(".works").css('color','black');
                }, function(){
                    $(".about").css('color','black');
                    $(".contact").css('color','black');
                    $(".works").css('color','black');
                });

                $( ".about" ).click(function() {
                    $(".about").css('color','black');
                        $(".aboutinfo2").css("display","inline-block");  
                        $(".contact2").css("display","inline-block"); 
                        $(".works1").css("display","inline-block"); 
                        $(".contact").css("display","none");  
                        $(".works").css("display","none"); 
                        $(".works2").css("display","none"); 
                        $(".toggle").css("display","none");   
                        $(".contactinfo").css('display','none');
                });
                
        </script>
        

    </head>

    <!-- 正文部分 -->
    <body>
    <section class="page1">
    <!-- 首页文字 -->   
        <div class="page1left">
        <div class="logo">
             <!-- logo -->   
        </div>
            <div class="blank1"></div>
        <h2>别让琐碎，掩盖了生活</h2>
            <div class="blank2"></div>
        <div class="button"><h3>了解更多</h3></div>
        </div>
        <div class="page1right">
             <!-- img -->    
        </div>
    </section>
    <!-- 首页img -->    



  </section>
</section>

</html>
